services:
  db:
    restart: always
    env_file: .env

  web:
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command:
      - gunicorn
      - project.wsgi:application
      - --bind
      - "0.0.0.0:8000"
      - --workers
      - "3"
      - --threads
      - "2"
      - --timeout
      - "60"
    expose:
      - "8000"
    ports: []
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
