<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#133a7c"/>
      <stop offset="100%" stop-color="#0b2454"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="65" x2="400" y2="65"/>
    <line x1="0" y1="130" x2="400" y2="130"/>
    <line x1="0" y1="195" x2="400" y2="195"/>
    <line x1="100" y1="0" x2="100" y2="260"/>
    <line x1="200" y1="0" x2="200" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="400" height="4" fill="url(#accent)"/>

  <!-- Newspaper icon -->
  <g transform="translate(200,118)" opacity="0.55">
    <rect x="-36" y="-32" width="52" height="64" rx="4" stroke="#ffffff" stroke-width="2.5" fill="none"/>
    <rect x="-10" y="-32" width="26" height="64" rx="0" rx="0 4 4 0" stroke="#ffffff" stroke-width="2.5" fill="none"/>
    <line x1="-28" y1="-18" x2="-4" y2="-18" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-28" y1="-8" x2="-4" y2="-8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-28" y1="2" x2="-4" y2="2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-28" y1="12" x2="-4" y2="12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="-2" y="-20" width="14" height="14" rx="2" fill="rgba(255,255,255,0.18)" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- $# label -->
  <text x="200" y="172" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-weight="700" letter-spacing="4"
        fill="rgba(255,255,255,0.45)">$# </text>
</svg>
