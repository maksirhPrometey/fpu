<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a4a9b"/>
      <stop offset="100%" stop-color="#0b2454"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <!-- top accent line -->
  <rect x="0" y="0" width="400" height="3" fill="#f59e0b"/>
  <!-- ФПУ monogram -->
  <text x="200" y="126" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64" font-weight="900" letter-spacing="-2"
        fill="rgba(255,255,255,0.12)">ФПУ</text>
  <!-- label -->
  <text x="200" y="175" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11" font-weight="600" letter-spacing="3.5"
        fill="rgba(255,255,255,0.38)">НОВИНИ</text>
</svg>
