upstream fpu_django {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name testwww.fpsu.org.ua 62.80.171.14;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name testwww.fpsu.org.ua 62.80.171.14;

    ssl_certificate     /usr/local/etc/nginx/testwww.crt;
    ssl_certificate_key /usr/local/etc/nginx/testwww.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location /static/ {
        alias /mnt_data/fpsu/staticfiles/;
        expires 30d;
    }

    location /media/spo/ {
        alias /mnt_data/fpsu/media/spo/;
        expires 7d;
    }

    # Проксі до старого Joomla сайту для зображень статей
    location /media/joomla_images/ {
        proxy_pass https://www.fpsu.org.ua/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.fpsu.org.ua;
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /mnt_data/fpsu/media/;
        expires 7d;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://fpu_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
