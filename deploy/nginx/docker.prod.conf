upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name testwww.fpsu.org.ua www.fpsu.org.ua fpsu.org.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name testwww.fpsu.org.ua www.fpsu.org.ua fpsu.org.ua;

    ssl_certificate     /etc/letsencrypt/live/testwww.fpsu.org.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testwww.fpsu.org.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
