# Temporary HTTP-only config (no HTTPS redirect) for certbot / debugging.
# Copy to /usr/local/etc/nginx/fpu.conf when SSL is not ready yet.

upstream fpu_django {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name testwww.fpsu.org.ua 62.80.171.14;

    client_max_body_size 20M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location /static/ {
        alias /mnt_data/fpsu/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /mnt_data/fpsu/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://fpu_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
